version: "3.9"

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-kingdom}
      POSTGRES_USER: ${DB_USER:-kingdom}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    restart: unless-stopped

  web:
    build: .
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  static_data:
