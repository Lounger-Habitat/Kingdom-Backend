worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # gzip 压缩（减少 WebGL 传输体积）
    gzip on;
    gzip_types application/wasm application/javascript application/json text/css;
    gzip_min_length 1024;

    upstream django {
        server web:8000;
    }

    server {
        listen       80;
        server_name  localhost;

        client_max_body_size 10M;

        # ============ Django 静态文件 ============
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
        }

        # ============ WebGL 静态文件 ============
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # Unity 构建文件 — 正确 MIME 类型 + 长缓存
        location /Build/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            types {
                application/wasm wasm;
                application/octet-stream data;
                application/javascript js;
            }
        }

        # TemplateData 静态资源
        location /TemplateData/ {
            root /usr/share/nginx/html;
            expires 30d;
        }

        # ============ Django API + SSE 代理 ============
        location ~ ^/api/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # Django Admin 代理
        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Django 业务 API 代理（无 /api/ 前缀的路径）
        location /player/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /game/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /leaderboard/history/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ============ WebSocket 代理 ============
        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ============ AI 服务器代理 ============
        location /local/ {
            rewrite ^/local/(.*) /$1 break;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }
    }
}
